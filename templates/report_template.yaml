## Friendship Report Template
## This file defines the schema for locally stored reports at ~/.ocfr/reports/<user>.yaml
## Reports are generated by the Claw after a negotiation completes. They are NEVER pushed to git.

match_id: "${USER_A}__${USER_B}"
status: "${STATUS}"                    # "matched" or "partial"
generated_at: "${GENERATED_AT}"
affinity_score: ${AFFINITY_SCORE}
their_score: ${THEIR_SCORE}
rounds_completed: ${ROUNDS_COMPLETED}

about:
  display_name: "${DISPLAY_NAME}"
  github: "${GITHUB_USERNAME}"
  bio: "${BIO}"

claw_skill_declaration:
  primary_skills:
  ${PRIMARY_SKILLS}
  project_areas:
  ${PROJECT_AREAS}
  collaboration_style: "${COLLABORATION_STYLE}"
  timezone: "${TIMEZONE}"

personality_profile:
  traits:
  ${TRAITS}
  communication_style: "${COMMUNICATION_STYLE}"
  work_style: "${WORK_STYLE}"

compatibility_analysis:
  interest_overlap:
  ${INTEREST_OVERLAP}
  skill_complement:
  ${SKILL_COMPLEMENT}
  intent_alignment: "${INTENT_ALIGNMENT}"
  match_reason: "${MATCH_REASON}"

collaboration_suggestions:
${COLLABORATION_SUGGESTIONS}

learning_insights:
${LEARNING_INSIGHTS}
## Each entry:
##   - topic: "<subject area>"
##     insight: "<what you learned>"
##     source_round: <N>
##     applicable_to: "<how this applies to your work>"
##     security_status: "passed"  # "passed" or "blocked"

learning_summary: "${LEARNING_SUMMARY}"
